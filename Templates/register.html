{% extends "base.html" %}
{% block title %}Register - SecureApp{% endblock %}
{% block content %}
<div class="form-wrapper">
    <h2>Create an Account</h2>
    <form method="POST" action="{{ url_for('register') }}" novalidate>
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Choose a username"
                   minlength="3" maxlength="30" pattern="[a-zA-Z0-9_]+" required
                   autocomplete="username">
            <small>3&ndash;30 characters: letters, numbers, and underscores only.</small>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="your@email.com"
                   maxlength="120" required autocomplete="email">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Create a strong password"
                   minlength="8" maxlength="128" required autocomplete="new-password">
            <small>8+ chars, upper &amp; lowercase, a digit, and a special character.</small>
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password"
                   placeholder="Repeat your password" minlength="8" maxlength="128"
                   required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Register</button>
    </form>
    <p class="form-footer">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
</div>
{% endblock %}
