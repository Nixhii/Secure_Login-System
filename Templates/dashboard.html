{% extends "base.html" %}
{% block title %}Dashboard - SecureApp{% endblock %}
{% block content %}
<div class="dashboard">
    <h2>Dashboard</h2>
    <div class="profile-card">
        <div class="avatar">{{ user.username[0] | upper }}</div>
        <h3>{{ user.username }}</h3>
        <p class="email">{{ user.email }}</p>
        <p class="meta">Member since {{ user.created_at }}</p>
    </div>
</div>
{% endblock %}
